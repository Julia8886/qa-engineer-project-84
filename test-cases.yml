---
- summary: |
    Добавление товара в корзину из карточки
  Шаги: 1. Нажимаем кнопку "Добавить в корзину". 2. Перейти в корзину через иконку
    в шапке сайта.
  Ожидаемый результат: Товар отображается в корзине, цена и название соответствуют
    карточке, счетчик товаров в шапке увеличился на 1.
- summary: >
    Оформление заказа не авторизованным пользователем 


    Шаги:1.Перейти к оформлению заказа.
        2.Оставить поле "Телефон" пустым.
        3.Нажимаем кнопку "Подтвердить заказ".

    Ожидаемый результат: Заказ не оформлен, поле «Телефон» подсвечено красным с текстом «Обязательно для заполнения».
- summary: >
    Поиск товара по неполному названию


    Шаги:1.Ввести в строку поиска "Кола" (при наличии напитка в базе).
         2.Нажимаем кнопку "Войти".

    Ожидаемый результат: Отображается список товаров, содержащих в названии или описании корень "Кола"
